name: AKS Deployment (Bicep)

on:
  workflow_dispatch:   # manual run only

env:
  RESOURCE_GROUP: rg-aks-dev-gh
  LOCATION: centralus

jobs:

# =========================
# 1. VALIDATE
# =========================
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build Bicep
      run: |
        az bicep build --file infra/main.bicep

    - name: Validate Deployment
      run: |
        az group create \
          --name $RESOURCE_GROUP \
          --location $LOCATION

        az deployment group validate \
          --resource-group $RESOURCE_GROUP \
          --template-file infra/main.bicep \
          --parameters infra/params/dev.bicepparam


# =========================
# 2. DEPLOY
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Ensure Resource Group exists
      run: |
        az group create \
          --name $RESOURCE_GROUP \
          --location $LOCATION

    - name: Deploy AKS
      run: |
        az deployment group create \
          --resource-group $RESOURCE_GROUP \
          --template-file infra/main.bicep \
          --parameters infra/params/dev.bicepparam
